<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo sutil -->
  <defs>
    <linearGradient id="layerGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D9488;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Capa 1: Naranja (abajo izquierda) -->
  <path d="M 30 50 Q 35 35, 50 30 Q 45 50, 40 65 Q 30 60, 30 50 Z" fill="url(#layerGrad1)" opacity="0.9"/>

  <!-- Capa 2: Teal (arriba derecha) -->
  <path d="M 50 25 Q 65 28, 70 45 Q 65 50, 50 55 Q 55 35, 50 25 Z" fill="url(#layerGrad2)" opacity="0.85"/>

  <!-- Capa 3: Naranja oscuro (centro) -->
  <path d="M 40 45 Q 50 40, 60 45 Q 58 55, 50 60 Q 42 55, 40 45 Z" fill="#E74C3C" opacity="0.8"/>

  <!-- Detalles/líneas sutiles -->
  <circle cx="50" cy="50" r="22" fill="none" stroke="#FF6B35" stroke-width="0.5" opacity="0.4"/>
  <circle cx="50" cy="50" r="18" fill="none" stroke="#14B8A6" stroke-width="0.5" opacity="0.3"/>
</svg>